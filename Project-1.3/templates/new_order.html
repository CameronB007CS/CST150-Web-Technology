{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>New Order</h1>
    <form method="post">
        <div class="mb-3">
            <label for="table_number" class="form-label">Table Number</label>
            <!-- fixed: changed to type="number" so only valid numbers can be entered -->
            <input type="number" min="1" class="form-control" id="table_number" name="table_number" required>
        </div>
        <button type="submit" class="btn btn-primary">Create Order</button>
        <a href="{{ url_for('view_orders') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
