{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Add Menu Item</h1>
    <form method="post">
        <div class="mb-3">
            <label for="category" class="form-label">Category</label>
            <select class="form-select" id="category" name="category" required>
                <option value="">Select category</option>
                <!-- fixed: was "appetizerss" with a double s, didn't match the menu dict key -->
                <option value="appetizers">Appetizers</option>
                <option value="main_courses">Main Courses</option>
                <option value="desserts">Desserts</option>
                <option value="drinks">Drinks</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" name="name" required>
        </div>
        <div class="mb-3">
            <label for="price" class="form-label">Price</label>
            <!-- fixed: changed type to number with step so only valid prices can be entered -->
            <input type="number" step="0.01" min="0" class="form-control" id="price" name="price" required>
        </div>
        <button type="submit" class="btn btn-primary">Add Item</button>
        <a href="{{ url_for('view_menu') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
