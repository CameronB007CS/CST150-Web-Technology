{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Edit Menu Item</h1>
    <form method="post">
        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ item.name }}" required>
        </div>
        <div class="mb-3">
            <label for="price" class="form-label">Price</label>
            <!-- fixed: changed from type="text" to type="number" so only valid prices go through -->
            <input type="number" step="0.01" min="0" class="form-control" id="price" name="price" value="{{ item.price }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('view_menu') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
